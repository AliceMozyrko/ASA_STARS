base_config:
  - ./base.yaml
raw_data_dir: ''
processed_data_dir: data/processed/ukrainian
binary_data_dir: data/binary/ukrainian
metafile_path: data/processed/ukrainian/metadata_processed.json
ds_names: ukrainian
ds_names_in_training: ''
ds_names_in_testing: ''
noise_data_dir: data/binary/musan_24k
binarizer_cls: data_gen.stars_binarizer.STARSBinarizer
binarization_args:
  with_wav: true
  with_mel: false
  shuffle: true
test_prefixes: ['911', 'небо_жене', 'rendez_vous', 'відчуваю', 'благословенна_земля']
audio_sample_rate: 24000
fft_size: 512
win_size: 512
hop_size: 128
fmin: 30
fmax: 12000
audio_num_mel_bins: 80
f0_min: 50
f0_max: 900
dropout: 0.1
hidden_size: 256
task_cls: tasks.stars.task.StarsTask
###########
# model related params
###########
model: stars
conformer_kernel: 9
updown_rates: 2-2-2-2
channel_multiples: 1-1-1-1
bkb_net: conformer
bkb_layers: 2
unet_skip_layer: false
###########
# note prediction related hparams
###########
pe: rmvpe
pe_ckpt: checkpoints/rmvpe/model.pt
f0_add_noise: gaussian:0.04
f0_bin: 512
f0_filepath: ''
pitch_type: frame
use_pitch_embed: true
use_soft_note: false
note_start: 30
note_num: 85
note_pitch_label_smoothing: 0.005
note_pitch_start: 0
note_pitch_temperature: 0.01
pitch_attn_num_head: 4
min_note_dur: 80
note_bd_threshold: 0.8
note_bd_min_gap: 90
note_bd_ref_min_gap: 40
use_soft_note_bd: true
soft_note_bd_func: gaussian:80
note_bd_ratio: 2.42312
note_bd_add_noise: gaussian:0.002
note_bd_start: 0
note_bd_temperature: 0.2
note_bd_focal_loss: 5.0
lambda_note_bd: 1.0
lambda_note_pitch: 1.0
lambda_note_bd_focal: 3.0
lambda_note_bd_slur_punish: 0.0
label_pos_weight_decay: 0.95
###########
# noise
###########
noise_snr: 6-20
noise_prob: 0.0
noise_in_test: false
use_mel: true
use_mel_bins: 40
use_wav: false
use_wbd: false
min_word_dur: 20
mel_add_noise: gaussian:0.05
frames_multiple: 16
dataset_downsample_rate: 1.0
lr: 0.00001
scheduler: step_lr
scheduler_lr_step_size: 500
warmup_updates: 0
max_epochs: 100
max_updates: 300000
max_tokens: 100000
max_sentences: 16
val_check_interval: 10000
save_best: true
num_valid_plots: 10
num_valid_stats: 200
accumulate_grad_batches: 1
find_unused_parameters: true
pin_memory: true
ds_workers: 4
max_frames: 8000
input_process_name: none
save_plot: true
infer_meta_path: ''
infer_regulate_real_note_itv: true
infer_print_skipped: true
use_soft_ph_bd: true
soft_ph_bd_func: gaussian:80
ph_bd_focal_loss: 5.0
ph_num: 52
tech_attn_num_head: 4
note_attn_num_head: 4
max_note_num: 4
note_num_pre: true
tech_pre: true
lan_pre: true
gen_pre: true
emo_pre: true
meth_pre: true
pace_pre: true
range_pre: true
binary_tech_num: 9
lambda_commit: 0.25
vae_dropout: 0.0
nVQ: 48
crop: false
predictor_grad: 1.0
conformer_layers: 4
ph_start: 0
note_bd_start: 50000
vq_ph_start: 60000
vq_word_start: 60000
note_pitch_start: 70000
vq_note_start: 80000
tech_start: 90000
att_start: 110000

